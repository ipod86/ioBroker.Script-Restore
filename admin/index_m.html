<html>
<head>
	<link rel="stylesheet" type="text/css" href="../../css/adapter.css" />
	<link rel="stylesheet" type="text/css" href="../../lib/css/materialize.css">

	<script type="text/javascript" src="../../lib/js/jquery-3.2.1.min.js"></script>
	<script type="text/javascript" src="../../socket.io/socket.io.js"></script>

	<script type="text/javascript" src="../../js/translate.js"></script>
	<script type="text/javascript" src="../../lib/js/materialize.js"></script>
	<script type="text/javascript" src="../../js/adapter-settings.js"></script>

	<link rel="stylesheet" type="text/css" href="style.css" />
	<script type="text/javascript" src="words.js"></script>

	<script type="text/javascript">
		// Diese Funktion wird von ioBroker aufgerufen, wenn die Einstellungen geladen werden
		function load(settings, onChange) {
			if (!settings) return;
			$('.value').each(function () {
				var $key = $(this);
				var id = $key.attr('id');
				if ($key.attr('type') === 'checkbox') {
					$key.prop('checked', settings[id])
						.on('change', () => onChange());
				} else {
					$key.val(settings[id])
						.on('change', () => onChange())
						.on('keyup', () => onChange());
				}
			});
			onChange(false);
			// reinitialize all the Materialize labels on the page if you are dynamically adding inputs:
			if (M) M.updateTextFields();
		}

		// Diese Funktion wird von ioBroker aufgerufen, wenn der Speichern-Button gedrückt wird
		function save(callback) {
			var obj = {};
			$('.value').each(function () {
				var $this = $(this);
				if ($this.attr('type') === 'checkbox') {
					obj[$this.attr('id')] = $this.prop('checked');
				} else {
					obj[$this.attr('id')] = $this.val();
				}
			});
			callback(obj);
		}
	</script>
</head>

<body>
	<div class="m adapter-container">
		<div class="row">
			<div class="col s12 m4 l2">
				<img src="script-restore.png" class="logo">
			</div>
		</div>

		<div class="row">
			<div class="col s12 m8 l6 input-field">
				<input type="text" class="value" id="backupPath" />
				<label for="backupPath" class="translate">Lokaler Backup-Pfad</label>
				<span class="helper-text">Standard: /opt/iobroker/backups (Ordner muss existieren)</span>
			</div>
		</div>
		
		<div class="row">
			<div class="col s12">
				<p class="translate">
					Das Frontend zur Wiederherstellung der Skripte findest du als eigenen Tab links im ioBroker-Menü.
				</p>
			</div>
		</div>
	</div>
</body>
</html>
